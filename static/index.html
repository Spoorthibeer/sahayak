<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahayak — Shopping Assistant</title>
<style>
  :root {
    --bg: #f4f5f7;
    --panel: #ffffff;
    --border: #e2e4e9;
    --text: #1c1e21;
    --muted: #6b7280;
    --accent: #d9375e; /* Myntra-ish pink */
    --accent-dark: #b82a4b;
    --user-bubble: #d9375e;
    --assistant-bubble: #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--accent);
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 1.1rem;
    margin: 0;
    font-weight: 600;
  }
  header .subtitle {
    font-size: 0.75rem;
    opacity: 0.9;
    margin-top: 2px;
  }
  #lang-badge {
    background: rgba(255,255,255,0.2);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 0.75rem;
    white-space: nowrap;
  }
  main {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  .row {
    display: flex;
    width: 100%;
  }
  .row.user { justify-content: flex-end; }
  .row.assistant { justify-content: flex-start; }
  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 14px;
    line-height: 1.4;
    font-size: 0.92rem;
    white-space: pre-wrap;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  .row.user .bubble {
    background: var(--user-bubble);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .row.assistant .bubble {
    background: var(--assistant-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .row.system .bubble {
    background: transparent;
    color: var(--muted);
    font-size: 0.8rem;
    font-style: italic;
    max-width: 100%;
    text-align: center;
    margin: 0 auto;
  }
  .products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
    max-width: 78%;
  }
  .product-card {
    background: var(--assistant-bubble);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 0.78rem;
  }
  .product-card .name { font-weight: 600; margin-bottom: 2px; }
  .product-card .price { color: var(--accent-dark); font-weight: 600; }
  .product-card .meta { color: var(--muted); margin-top: 2px; }

  footer {
    flex-shrink: 0;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: var(--panel);
    border-top: 1px solid var(--border);
  }
  #input-row {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #text-input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    font-size: 0.95rem;
    outline: none;
  }
  #text-input:focus { border-color: var(--accent); }
  button.icon-btn {
    border: none;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    flex-shrink: 0;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s ease;
  }
  button.icon-btn:active { transform: scale(0.92); }
  #send-btn { background: var(--accent); color: white; }
  #send-btn:hover { background: var(--accent-dark); }
  #mic-btn { background: #eef0f3; color: var(--text); }
  #mic-btn.listening {
    background: var(--accent);
    color: white;
    animation: pulse 1.1s infinite;
  }
  #mic-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(217,55,94,0.5); }
    70% { box-shadow: 0 0 0 10px rgba(217,55,94,0); }
    100% { box-shadow: 0 0 0 0 rgba(217,55,94,0); }
  }
  #hint {
    max-width: 720px;
    margin: 4px auto 0;
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Sahayak</h1>
    <div class="subtitle">Your shopping assistant — type or speak, in English, Hindi, or Telugu</div>
  </div>
  <div id="lang-badge">Language: English</div>
</header>

<main id="chat-window"></main>

<footer>
  <div id="input-row">
    <button id="mic-btn" class="icon-btn" title="Speak your message">🎤</button>
    <input id="text-input" type="text" placeholder="Type your message..." autocomplete="off">
    <button id="send-btn" class="icon-btn" title="Send">➤</button>
  </div>
  <div id="hint"></div>
</footer>

<script>
(function () {
  // ---- session_id: generated once per page load, sent with every /chat
  // request so the backend keeps using the same in-memory Chat object and
  // therefore remembers this conversation (see app.py / CLAUDE.md).
  const sessionId = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random());

  // The backend (agent.detect_language, via /chat's "language" field) is the
  // single source of truth for which of Sahayak's 3 supported languages the
  // conversation is in. The frontend just passes that name straight to
  // /speak — the BCP-47 mapping now lives server-side in app.py.
  let currentLanguage = "English";

  // Currently-playing agent reply audio, kept so it can be interrupted
  // (barge-in): if the customer taps the mic to speak again while the
  // agent is still talking, that audio must stop immediately rather than
  // making them wait for it to finish.
  let currentAudio = null;

  function stopCurrentAudio() {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }
  }

  const chatWindow = document.getElementById("chat-window");
  const textInput = document.getElementById("text-input");
  const sendBtn = document.getElementById("send-btn");
  const micBtn = document.getElementById("mic-btn");
  const langBadge = document.getElementById("lang-badge");
  const hint = document.getElementById("hint");

  function addRow(role, text) {
    const row = document.createElement("div");
    row.className = "row " + role;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    row.appendChild(bubble);
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return row;
  }

  function addProducts(products) {
    if (!products || products.length === 0) return;
    const row = document.createElement("div");
    row.className = "row assistant";
    const grid = document.createElement("div");
    grid.className = "products";
    products.forEach(function (p) {
      const card = document.createElement("div");
      card.className = "product-card";
      card.innerHTML =
        '<div class="name">' + (p.name || "") + '</div>' +
        '<div class="price">₹' + (p.price != null ? p.price : "?") + '</div>' +
        '<div class="meta">' + (p.category || "") + (p.occasion ? " · " + p.occasion : "") + '</div>';
      grid.appendChild(card);
    });
    row.appendChild(grid);
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function setLanguage(lang) {
    if (!lang) return;
    currentLanguage = lang;
    langBadge.textContent = "Language: " + lang;
  }

  // Calls the backend's /speak endpoint (Google Cloud Text-to-Speech) and
  // plays the returned audio. A TTS failure only drops the spoken reply —
  // the text reply is already on screen, so it must not break the chat flow.
  async function playReply(text, language) {
    stopCurrentAudio();
    if (!text) return;

    let blob;
    try {
      const res = await fetch("/speak", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: text, lang: language || currentLanguage }),
      });
      if (!res.ok) return;
      blob = await res.blob();
    } catch (err) {
      return;
    }

    const url = URL.createObjectURL(blob);
    const audioEl = new Audio(url);
    currentAudio = audioEl;
    audioEl.addEventListener("ended", function () {
      if (currentAudio === audioEl) currentAudio = null;
      URL.revokeObjectURL(url);
    });
    audioEl.play().catch(function () {
      // Autoplay can be blocked before the user has interacted with the
      // page at all; the text reply is already visible either way.
    });
  }

  async function sendMessage(message) {
    message = (message || "").trim();
    if (!message) return;

    addRow("user", message);
    textInput.value = "";
    const thinkingRow = addRow("system", "Sahayak is typing...");

    let data;
    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message: message }),
      });
      data = await res.json();
    } catch (err) {
      thinkingRow.remove();
      addRow("assistant", "Sorry, I couldn't reach the server. Please check your connection and try again.");
      return;
    }

    thinkingRow.remove();
    addRow("assistant", data.reply || "(no reply)");
    addProducts(data.products);
    setLanguage(data.language);
    playReply(data.reply || "", data.language);
  }

  sendBtn.addEventListener("click", function () { sendMessage(textInput.value); });
  textInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") sendMessage(textInput.value);
  });

  // ---- Voice input: record with MediaRecorder, POST the audio to
  // /transcribe (Google Cloud Speech-to-Text), then send the returned text
  // to /chat exactly like a typed message.
  let mediaRecorder = null;
  let recordedChunks = [];
  let isRecording = false;

  function startRecording() {
    // Barge-in: stop the agent's spoken reply the instant the customer
    // taps the mic to speak again, before even asking for mic permission —
    // they should never have to wait for the agent to finish talking.
    stopCurrentAudio();

    navigator.mediaDevices.getUserMedia({ audio: true }).then(function (stream) {
      recordedChunks = [];
      const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
        ? "audio/webm;codecs=opus"
        : "audio/webm";
      mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });

      mediaRecorder.addEventListener("dataavailable", function (e) {
        if (e.data.size > 0) recordedChunks.push(e.data);
      });

      mediaRecorder.addEventListener("stop", function () {
        stream.getTracks().forEach(function (t) { t.stop(); });
        isRecording = false;
        micBtn.classList.remove("listening");
        hint.textContent = "Transcribing...";

        const blob = new Blob(recordedChunks, { type: mimeType });
        const formData = new FormData();
        formData.append("audio", blob, "recording.webm");

        fetch("/transcribe", { method: "POST", body: formData })
          .then(function (res) { return res.json(); })
          .then(function (data) {
            hint.textContent = "";
            if (data.text && data.text.trim()) {
              sendMessage(data.text);
            } else {
              hint.textContent = "Didn't catch that — please try again or type instead.";
            }
          })
          .catch(function () {
            hint.textContent = "Couldn't reach the server to transcribe. Please try again.";
          });
      });

      mediaRecorder.start();
      isRecording = true;
      micBtn.classList.add("listening");
      hint.textContent = "Listening...";
    }).catch(function () {
      hint.textContent = "Microphone access denied or unavailable.";
    });
  }

  function stopRecording() {
    if (mediaRecorder && isRecording) {
      mediaRecorder.stop();
    }
  }

  if (!navigator.mediaDevices || !window.MediaRecorder) {
    micBtn.disabled = true;
    micBtn.title = "Voice input isn't supported in this browser";
    hint.textContent = "Voice input isn't supported in this browser — try Chrome, or type your message.";
  } else {
    micBtn.addEventListener("click", function () {
      if (isRecording) {
        stopRecording();
      } else {
        startRecording();
      }
    });
  }

  addRow("system", "Say hello, or ask for something like “shirt under 800 for office”.");
})();
</script>

</body>
</html>
